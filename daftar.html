<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Daftar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex justify-content-center align-items-center vh-100">

<div class="card shadow p-4" style="width: 350px;">
  <h3 class="text-center text-danger mb-3">Daftar</h3>

  <form action="daftar.php" method="POST">
    <input type="text" name="nama" class="form-control mb-2" placeholder="Username" required>
    <input type="email" name="email" class="form-control mb-2" placeholder="Email" required>
    <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>

    <button type="submit" class="btn btn-danger w-100">Daftar</button>
  </form>

  <p class="text-center mt-3">
    Sudah punya akun? <a href="login.html">Login</a>
  </p>
</div>

</body>
</html>
