<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Ubah Sandi</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #ff4d4d, #ff1a1a);
    }
  </style>
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

<div class="card shadow-lg p-4" style="width: 350px; border-radius: 15px;">
  
  <h4 class="text-center text-danger mb-3">Ubah Sandi</h4>

  <form action="sandi.php" method="POST">

    <!-- USERNAME -->
    <input type="text" name="username" class="form-control mb-2" placeholder="Masukkan Username" required>

    <!-- PASSWORD LAMA -->
    <input type="password" name="password_lama" class="form-control mb-2" placeholder="Password Lama" required>

    <!-- PASSWORD BARU -->
    <input type="password" name="password_baru" class="form-control mb-3" placeholder="Password Baru" required>

    <button type="submit" class="btn btn-danger w-100">
      Ubah Sandi
    </button>

  </form>

  <p class="text-center mt-3 mb-0">
    <a href="login.html">Kembali ke Login</a>
  </p>

</div>

</body>
</html>
